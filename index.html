<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MisGastos</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- ── Pantalla de Login ── -->
  <div id="loginScreen">
    <div class="login-card">
      <div class="login-icon">💸</div>
      <h1 class="login-title">MisGastos</h1>
      <p class="login-sub">Inicia sesión para ver tus finanzas</p>

      <div class="login-field">
        <label>Correo electrónico</label>
        <input type="email" id="loginEmail" placeholder="tu@correo.com" autocomplete="email"/>
      </div>

      <div class="login-field">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
      </div>

      <p class="login-error" id="loginError"></p>
      <button class="btn-login" id="btnLogin">Entrar</button>
    </div>
  </div>

  <!-- ── App principal (oculta hasta login) ── -->
  <div id="appContent" style="display:none">

    <header>
      <div class="header-top">
        <div>
          <p class="greeting" id="greeting">Hola</p>
          <h1 class="app-name">MisGastos</h1>
        </div>
        <div class="header-actions">
          <button class="btn-demo" id="btnDemo">📊 Datos de prueba</button>
          <span class="btn-month" id="btnMonth"></span>
          <button class="btn-logout" id="btnLogout">Salir</button>
        </div>
      </div>
    </header>

    <div class="layout">

      <div class="col-left">
        <div class="card-total">
          <p class="card-label">Gastado este mes</p>
          <h2 class="card-amount" id="totalAmount">$0.00</h2>
          <div class="budget-row">
            <span id="budgetLabel">Presupuesto: $8,000</span>
            <span id="budgetPct">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="card-stats">
            <div class="stat">
              <span class="stat-label">Gastos</span>
              <span class="stat-val" id="countMonth">0</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat">
              <span class="stat-label">Promedio/día</span>
              <span class="stat-val" id="avgDay">—</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat">
              <span class="stat-label">Mayor gasto</span>
              <span class="stat-val" id="maxExpense">—</span>
            </div>
          </div>
        </div>

        <div class="chart-card">
          <h3 class="chart-title">Por categoría</h3>
          <div class="donut-wrap">
            <canvas id="donutChart"></canvas>
          </div>
        </div>
      </div>

      <div class="col-right">
        <div class="mini-stats" id="miniStats"></div>

        <div class="chart-card">
          <h3 class="chart-title">Gasto acumulado vs presupuesto</h3>
          <canvas id="lineChart"></canvas>
        </div>

        <div class="section-header">
          <h3 class="section-title">Desglose por categoría</h3>
        </div>
        <div class="categories-grid" id="categoriesGrid"></div>

        <div class="section-header" style="margin-top:24px">
          <h3 class="section-title">Movimientos</h3>
          <button class="btn-clear-all" id="btnClearAll">Borrar todo</button>
        </div>
        <div class="transactions" id="transactionsList"></div>
      </div>

    </div>

    <button class="fab" id="fabBtn">+</button>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-handle"></div>
        <h3 class="modal-title">Nuevo gasto</h3>
        <div class="amount-input-wrap">
          <span class="currency-sign">$</span>
          <input type="number" id="inputAmount" placeholder="0.00" min="0" step="0.01"/>
        </div>
        <input type="text" class="desc-input" id="inputDesc" placeholder="¿En qué gastaste?"/>
        <p class="field-label">Categoría</p>
        <div class="cat-picker" id="catPicker"></div>
        <p class="field-label">Fecha</p>
        <input type="date" class="date-input" id="inputDate"/>
        <button class="btn-save" id="btnSave">Guardar gasto</button>
        <button class="btn-cancel" id="btnCancel">Cancelar</button>
      </div>
    </div>

  </div><!-- /appContent -->

  <script src="script.js"></script>
</body>
</html>
